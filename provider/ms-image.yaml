credentials_for_provider:
  api_key:
    type: secret-input
    required: true
    label:
      en_US: API Key
      zh_Hans: API密钥
    placeholder:
      en_US: Please input your ModelScope API Key (ms-xxxxxx)
      zh_Hans: 请输入您的 ModelScope API Key (ms-xxxxxx)
    help:
      en_US: Get your API key from ModelScope
      zh_Hans: 从 ModelScope 获取 API 密钥
    url: https://modelscope.cn/my/myaccesstoken

identity:
  author: "jinhaow"
  name: "ms-image"
  label:
    en_US: "ModelScope-Image"
    zh_Hans: "ModelScope-Image"
  description:
    en_US: "A relatively universal modelscope API-Inference plugin for text-to-image and image-to-image, which can call most of the modelscope AIGC models."
    zh_Hans: "一个比较通用的modelscope API-Inference文生图和图生图的插件，可以调用modelscope大部分AIGC模型。"
  icon: "icon.svg"
  tag:
    - "image"
    - "utilities"

tools:
  - tools/text2image.yaml
  - tools/image2image.yaml
extra:
  python:
    source: provider/ms-image.py
